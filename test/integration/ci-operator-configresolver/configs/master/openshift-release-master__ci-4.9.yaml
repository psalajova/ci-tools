zz_generated_metadata:
  org: openshift
  repo: release
  branch: master
  variant: ci-4.9
base_images:
  release-job-base:
    name: "4.2"
    namespace: ocp
    tag: release-job-base
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-aws
  steps:
    cluster_profile: aws
    workflow: ipi
    test:
    - as: e2e
      from: my-image
      commands: TEST_SUITE=openshift/conformance/parallel run-tests
      resources:
        requests:
          cpu: 1000m
          memory: 2Gi
- as: e2e
  steps:
    cluster_profile: azure4
    workflow: ipi
    test:
    - as: e2e
      from: my-image
      commands: make azure-e2e
      resources:
        requests:
          cpu: 1000m
          memory: 2Gi
